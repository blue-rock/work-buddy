<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <!-- Animated particle background -->
  <canvas id="particleCanvas"></canvas>
  <div class="bg-glow" id="bgGlow"></div>

  <!-- Suggestion button -->
  <button class="suggestion-btn" onclick="toggleSuggestionModal()" title="Send a suggestion">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
  </button>

  <!-- Suggestion modal -->
  <div class="modal-overlay" id="suggestionOverlay" onclick="closeSuggestionModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Send a Suggestion</span>
        <button class="modal-close" onclick="toggleSuggestionModal()">&times;</button>
      </div>
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSfthcmw2ISaV67uCAjmF_JceXP76HARG8fCmRMGtb3wL7ZfqA/viewform?embedded=true"
        width="100%" height="450" frameborder="0" marginheight="0" marginwidth="0"
        style="border-radius: 0 0 12px 12px;">
        Loading...
      </iframe>
    </div>
  </div>

  <!-- Focus mode button -->
  <button class="focus-btn" id="focusModeBtn" onclick="toggleFocusMode()" title="Enter focus mode">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
    </svg>
  </button>

  <!-- Settings toggle -->
  <button class="settings-toggle" id="settingsToggle" onclick="toggleSettingsPanel()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  </button>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-panel-title">Appearance</div>
    <div id="themeSwitcher"></div>
  </div>

  <div class="app">
    <header class="header">
      <h1>Focus Flow</h1>
      <p>Stay focused, get things done</p>
    </header>

    <div class="grid">
      <!-- Pomodoro Timer -->
      <div class="card timer-card">
        <div class="card-title">Pomodoro Timer</div>

        <div class="timer-display">
          <div class="progress-ring-container">
            <svg class="progress-ring" width="200" height="200">
              <circle class="progress-ring-bg" cx="100" cy="100" r="88" />
              <circle class="progress-ring-fill" id="progressRing" cx="100" cy="100" r="88"
                stroke-dasharray="553" stroke-dashoffset="0" />
            </svg>
            <div class="timer-inner">
              <div class="timer-time" id="timerDisplay">25:00</div>
              <div class="timer-label" id="timerLabel">Work Session</div>
            </div>
          </div>
          <div class="timer-linked-task" id="timerLinkedTask" style="display:none;"></div>
        </div>

        <div class="timer-controls">
          <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Start</button>
          <button class="btn btn-ghost" onclick="resetTimer()">Reset</button>
          <button class="btn btn-ghost" onclick="skipPhase()">Skip</button>
        </div>

        <div class="time-settings">
          <div class="time-setting">
            <label>Work</label>
            <input type="number" id="workMin" value="25" min="1" max="120" onchange="updateSettings()">
            <span>min</span>
          </div>
          <div class="time-setting">
            <label>Break</label>
            <input type="number" id="breakMin" value="5" min="1" max="60" onchange="updateSettings()">
            <span>min</span>
          </div>
          <div class="time-setting">
            <label>Long Break</label>
            <input type="number" id="longBreakMin" value="15" min="1" max="60" onchange="updateSettings()">
            <span>min</span>
          </div>
        </div>

        <div class="sessions" id="sessionDots"></div>

        <!-- Quote display -->
        <div class="quote-container">
          <div id="quoteDisplay">
            <div class="quote-text"></div>
            <div class="quote-author"></div>
          </div>
        </div>

        <div class="focus-exit-hint">Press <strong>Esc</strong> to exit focus mode</div>
      </div>

      <!-- Todo List -->
      <div class="card">
        <div class="card-title">Tasks</div>

        <div class="todo-input-row">
          <input type="text" class="todo-input" id="todoInput" placeholder="Add a new task..." onkeydown="if(event.key==='Enter')addTodo()">
          <button class="btn-add" onclick="addTodo()">+</button>
        </div>

        <div class="todo-options-row">
          <select class="todo-option-select" id="todoPriority">
            <option value="none">No priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <input type="date" class="todo-option-input" id="todoDueDate" title="Due date">
          <div class="tag-input-wrapper">
            <input type="text" id="todoTag" placeholder="Tag..." onkeydown="if(event.key==='Enter')addTodo()">
          </div>
        </div>

        <div class="todo-filters">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
          <button class="filter-btn" onclick="setFilter('completed', this)">Done</button>
        </div>

        <div class="tag-filter-bar" id="tagFilterBar"></div>

        <ul class="todo-list" id="todoList"></ul>

        <div class="todo-stats" id="todoStats" style="display:none;">
          <span id="todoCount"></span>
          <button class="btn-clear" onclick="clearCompleted()">Clear completed</button>
        </div>
      </div>
    </div>
  </div>

  <script src="timer.js"></script>
  <script src="todos.js"></script>
  <script src="themes.js"></script>
  <script src="particles.js"></script>
  <script src="focus.js"></script>
  <script>
    // Migrate old todos that lack new fields
    todos = todos.map(t => ({
      priority: 'none',
      dueDate: null,
      tag: null,
      subtasks: [],
      pomodoros: 0,
      ...t
    }));
    saveTodos();

    // Suggestion modal
    function toggleSuggestionModal() {
      document.getElementById('suggestionOverlay').classList.toggle('open');
    }

    function closeSuggestionModal(e) {
      if (e.target === e.currentTarget) toggleSuggestionModal();
    }

    // Settings panel toggle
    function toggleSettingsPanel() {
      const panel = document.getElementById('settingsPanel');
      const btn = document.getElementById('settingsToggle');
      const isOpen = panel.classList.toggle('open');
      btn.classList.toggle('active', isOpen);
    }

    // Close settings panel on outside click
    document.addEventListener('click', (e) => {
      const panel = document.getElementById('settingsPanel');
      const btn = document.getElementById('settingsToggle');
      if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove('open');
        btn.classList.remove('active');
      }
    });

    // Init
    loadAppearance();
    loadSettings();
    loadTimerState();
    renderThemeSwitcher();
    renderTagFilters();
    renderTodos();
    renderQuote();
  </script>
  <script src="animations.js"></script>
</body>
</html>
